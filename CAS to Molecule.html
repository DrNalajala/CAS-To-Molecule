<!DOCTYPE html>
<html>
<head>
  <title>CAS Chemical Analyzer PRO</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
      padding: 30px;
    }
    h1 {
      color: #2c3e50;
    }
    input {
      padding: 12px;
      width: 250px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-left: 10px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #2980b9;
    }
    .card {
      background: white;
      padding: 20px;
      margin-top: 30px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
      display: inline-block;
      width: 400px;
    }
    img {
      margin-top: 15px;
      max-width: 250px;
    }
  </style>
</head>
<body>

<h1>🧪 CAS Chemical Analyzer PRO</h1>

<input type="text" id="cas" placeholder="Enter CAS (e.g. 64-17-5)">
<button onclick="fetchData()">Analyze</button>

<div id="result"></div>

<script>
async function fetchData() {
  const cas = document.getElementById("cas").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "⏳ Fetching data...";

  try {
    // Get CID
    let cidRes = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${cas}/cids/JSON`);
    let cidData = await cidRes.json();
    let cid = cidData.IdentifierList.CID[0];

    // Get properties
    let propRes = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/property/IUPACName,MolecularFormula,MolecularWeight,CanonicalSMILES,InChI/JSON`);
    let propData = await propRes.json();
    let prop = propData.PropertyTable.Properties[0];

    let imageUrl = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/PNG`;

    resultDiv.innerHTML = `
      <div class="card">
        <h2>🔍 Results</h2>
        <p><b>IUPAC Name:</b><br>${prop.IUPACName}</p>
        <p><b>Molecular Formula:</b> ${prop.MolecularFormula}</p>
        <p><b>Molecular Weight:</b> ${prop.MolecularWeight}</p>
        <p><b>SMILES:</b><br>${prop.CanonicalSMILES}</p>
        <p><b>InChI:</b><br>${prop.InChI}</p>
        <img src="${imageUrl}" alt="Structure">
      </div>
    `;

  } catch (error) {
    resultDiv.innerHTML = "❌ Error: Invalid CAS or not found in database.";
  }
}
</script>

</body>
</html>
